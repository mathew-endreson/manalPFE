<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzBac Admin | Content Management</title>
    <link rel="icon" type="image/png" href="ezbac-icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #BB181D;
            --primary-hover: #9a1418;
            --bg-light: #fefefe;
            --text-dark: #2D2D2D;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.05);
            --radius-main: 24px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8f9fa;
            margin: 0;
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* Password Gate */
        #loginGate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-main);
            box-shadow: var(--shadow-soft);
            text-align: center;
            width: 320px;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* Dashboard Styles */
        .admin-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .admin-sidebar {
            background: white;
            padding: 40px 20px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-btn, .nav-btn-exit {
            background: none;
            border: none;
            padding: 15px 20px;
            text-align: left;
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            color: #666;
            transition: 0.3s;
            width: 100%;
        }

        .nav-btn.active {
            background: #fff0f0;
            color: var(--primary);
        }

        .nav-btn:hover, .nav-btn-exit:hover {
            background: #fdfdfd;
            color: var(--primary);
        }

        .admin-main {
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .section-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-main);
            box-shadow: var(--shadow-soft);
            margin-bottom: 30px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus { border-color: var(--primary); outline: none; }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn-save:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* Data List View */
        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .delete-btn {
            color: #BB181D;
            cursor: pointer;
            font-weight: bold;
            padding: 8px;
        }

        .hidden { display: none !important; }

        /* Toast Alert */
        #toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 10000;
            opacity: 0;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <!-- PASSWORD GATE -->
    <div id="loginGate">
        <div class="login-card">
            <img src="assets/images/logo.svg" style="height: 40px; margin-bottom: 20px;">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Enter Password">
            <button class="btn-save" onclick="checkAuth()">Access Portal</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="admin-layout hidden" id="adminDashboard">
        
        <div class="admin-sidebar">
            <div style="padding: 0 20px; margin-bottom: 30px;">
                <img src="assets/images/logo.svg" style="height: 35px;">
                <p style="color: #999; font-size: 12px; margin-top: 5px;">EzBac CMS v2.0</p>
            </div>
            <button class="nav-btn active" data-target="add-quiz">➕ Add Quiz</button>
            <button class="nav-btn" data-target="add-flash">➕ Add Flashcard</button>
            <button class="nav-btn" data-target="add-resource">➕ Add Resource</button>
            <button class="nav-btn" data-target="view-data">📋 View Data</button>
            <button class="nav-btn" data-target="manage-users">👤 Manage Users</button>
            <hr style="width: 100%; border: none; border-top: 1px solid #eee; margin: 20px 0;">
            <button class="nav-btn-exit" onclick="location.href='home.html'">⬅ Exit Admin</button>
        </div>

        <div class="admin-main">
            
            <!-- SECTION: ADD QUIZ -->
            <div id="add-quiz" class="admin-section">
                <div class="section-card">
                    <h2>Add New Quiz <span id="edit-label-quiz" class="hidden" style="font-size: 14px; color: var(--primary); font-weight: normal; margin-left: 10px;">— Editing Mode</span></h2>
                    <form id="quizForm">
                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" id="q-subject" placeholder="e.g. History, Math, SVT..." required>
                        </div>
                        
                        <div id="questionsContainer">
                            <!-- Questions added here -->
                            <div class="question-entry" style="border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                                <div class="form-group">
                                    <label>Question 1</label>
                                    <textarea class="q-text" placeholder="Enter the question..." required></textarea>
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                    <div class="form-group"><label>Opt 1</label><input type="text" class="q-opt1" required></div>
                                    <div class="form-group"><label>Opt 2</label><input type="text" class="q-opt2" required></div>
                                    <div class="form-group"><label>Opt 3</label><input type="text" class="q-opt3" required></div>
                                    <div class="form-group"><label>Opt 4</label><input type="text" class="q-opt4" required></div>
                                </div>
                                <div class="form-group">
                                    <label>Correct Answer (Exact match)</label>
                                    <input type="text" class="q-correct" required>
                                </div>
                            </div>
                        </div>

                        <button type="button" id="addQuestionBtn" style="background: #f1f5f9; color: #333; margin-bottom: 20px; padding: 12px; border-radius: 10px; font-weight: 600;" class="nav-btn">
                            + Add Another Question
                        </button>

                        <button type="submit" class="btn-save">Save Quiz Package</button>
                    </form>
                </div>
            </div>

            <!-- SECTION: ADD FLASHCARD -->
            <div id="add-flash" class="admin-section hidden">
                <div class="section-card">
                    <h2>Add New Flashcard <span id="edit-label-flash" class="hidden" style="font-size: 14px; color: var(--primary); font-weight: normal; margin-left: 10px;">— Editing Mode</span></h2>
                    <form id="flashForm">
                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" id="f-subject" placeholder="e.g. Physics" required>
                        </div>
                        <div id="flashcardsContainer">
                            <div class="flashcard-entry" style="border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                                <div class="form-group">
                                    <label>Front (Question)</label>
                                    <input type="text" class="f-question" required>
                                </div>
                                <div class="form-group">
                                    <label>Back (Answer)</label>
                                    <textarea class="f-answer" required></textarea>
                                </div>
                            </div>
                        </div>

                        <button type="button" id="addFlashBtn" style="background: #f1f5f9; color: #333; margin-bottom: 20px; padding: 12px; border-radius: 10px; font-weight: 600;" class="nav-btn">
                            + Add Another Flashcard
                        </button>

                        <button type="submit" class="btn-save">Save Flashcards</button>
                    </form>
                </div>
            </div>

            <!-- SECTION: ADD RESOURCE -->
            <div id="add-resource" class="admin-section hidden">
                <div class="section-card">
                    <h2>Add New Resource <span id="edit-label-res" class="hidden" style="font-size: 14px; color: var(--primary); font-weight: normal; margin-left: 10px;">— Editing Mode</span></h2>
                    <form id="resForm">
                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" id="r-subject" required>
                        </div>
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="r-title" required>
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="r-type">
                                <option value="drive">📂 Google Drive</option>
                                <option value="youtube">🎥 YouTube Video</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>URL</label>
                            <input type="url" id="r-url" placeholder="https://..." required>
                        </div>
                        <button type="submit" class="btn-save">Save Resource</button>
                    </form>
                </div>
            </div>

            <!-- SECTION: MANAGE USERS -->
            <div id="manage-users" class="admin-section hidden">
                <div class="section-card">
                    <h2>User Account Management</h2>
                    <div id="userList" style="margin-top: 20px;">
                        <p style="color: #aaa;">Loading users...</p>
                    </div>
                </div>

                <!-- Edit User Modal-like Form (Simple) -->
                <div id="editUserSection" class="section-card hidden">
                    <h3>Edit User: <span id="editingUserName"></span></h3>
                    <form id="editUserForm">
                        <input type="hidden" id="editUserId">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="editUserUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="editUserEmail" required>
                        </div>
                        <button type="submit" class="btn-save">Update User Account</button>
                        <button type="button" onclick="cancelUserEdit()" style="background: #eee; color: #333; margin-top: 10px;" class="btn-save">Cancel</button>
                    </form>
                </div>
            </div>

            <!-- SECTION: VIEW DATA -->
            <div id="view-data" class="admin-section hidden">
                <div class="section-card">
                    <h2>Live Content Monitor</h2>
                    <div style="margin-bottom: 20px;">
                        <button onclick="fetchListView('quizzes')">Quiz Data</button>
                        <button onclick="fetchListView('flashcards')">Flashcard Data</button>
                        <button onclick="fetchListView('resources')">Resources</button>
                    </div>
                    <div id="dataList">
                        <p style="color: #aaa;">Select a category above to view items.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="toast">Saved Successfully!</div>

    <!-- BACKEND INTEGRATION -->
    <script>
        let isEditing = false;
        let editingId = null;
        let editingType = null;

        // AUTH CHECK
        window.checkAuth = async function() {
            const pass = document.getElementById("adminPass").value;
            const res = await fetch('api/auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById("loginGate").classList.add("hidden");
                document.getElementById("adminDashboard").classList.remove("hidden");
            } else {
                alert(data.message || "Incorrect Password!");
            }
        };

        // NAV LOGIC
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                const target = btn.dataset.target;
                if(!target) return;
                
                document.querySelectorAll('.admin-section').forEach(s => s.classList.add('hidden'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                
                document.getElementById(target).classList.remove('hidden');
                btn.classList.add('active');
            };
        });

        // TOAST LOGIC
        function showToast(msg = "Saved Successfully!") {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 3000);
        }

        // ADD QUESTION FIELD
        function addQuestionField(data = null, count = null) {
            const container = document.getElementById("questionsContainer");
            const qCount = count || (container.children.length + 1);
            const qDiv = document.createElement("div");
            qDiv.className = "question-entry";
            qDiv.style = "border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 20px;";
            qDiv.innerHTML = `
                <div class="form-group">
                    <label>Question ${qCount}</label>
                    <textarea class="q-text" placeholder="Enter the question..." required>${data ? data.question : ""}</textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group"><label>Opt 1</label><input type="text" class="q-opt1" value="${data ? data.options[0] : ""}" required></div>
                    <div class="form-group"><label>Opt 2</label><input type="text" class="q-opt2" value="${data ? data.options[1] : ""}" required></div>
                    <div class="form-group"><label>Opt 3</label><input type="text" class="q-opt3" value="${data ? data.options[2] : ""}" required></div>
                    <div class="form-group"><label>Opt 4</label><input type="text" class="q-opt4" value="${data ? data.options[3] : ""}" required></div>
                </div>
                <div class="form-group">
                    <label>Correct Answer</label>
                    <input type="text" class="q-correct" value="${data ? data.correctAnswer : ""}" required>
                </div>
            `;
            container.appendChild(qDiv);
        }

        document.getElementById("addQuestionBtn").onclick = () => addQuestionField();

        // ADD FLASHCARD FIELD
        function addFlashcardField(data = null) {
            const container = document.getElementById("flashcardsContainer");
            const fDiv = document.createElement("div");
            fDiv.className = "flashcard-entry";
            fDiv.style = "border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 20px;";
            fDiv.innerHTML = `
                <div class="form-group">
                    <label>Front (Question)</label>
                    <input type="text" class="f-question" value="${data ? data.question : ""}" required>
                </div>
                <div class="form-group">
                    <label>Back (Answer)</label>
                    <textarea class="f-answer" required>${data ? data.answer : ""}</textarea>
                </div>
            `;
            container.appendChild(fDiv);
        }

        document.getElementById("addFlashBtn").onclick = () => addFlashcardField();

        // SAVE QUIZ
        document.getElementById("quizForm").onsubmit = async (e) => {
            e.preventDefault();
            const subject = document.getElementById("q-subject").value;
            const qEntries = document.querySelectorAll(".question-entry");
            
            const questions = [];
            qEntries.forEach(entry => {
                questions.push({
                    question: entry.querySelector(".q-text").value,
                    options: [
                        entry.querySelector(".q-opt1").value,
                        entry.querySelector(".q-opt2").value,
                        entry.querySelector(".q-opt3").value,
                        entry.querySelector(".q-opt4").value
                    ],
                    correctAnswer: entry.querySelector(".q-correct").value
                });
            });

            const data = {
                subject: subject,
                title: subject + " Quiz",
                questions: questions
            };
            if(isEditing && editingType === 'quizzes') data.id = editingId;
            
            try {
                const res = await fetch('api/quizzes.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(result.success) {
                    showToast(isEditing ? "Quiz Updated!" : "Quiz Saved!");
                    e.target.reset();
                    document.getElementById("questionsContainer").innerHTML = "";
                    addQuestionField();
                    if (isEditing) {
                        fetchListView('quizzes');
                        resetEditState();
                    }
                }
            } catch (err) { alert("Error: " + err.message); }
        };

        // SAVE FLASHCARDS
        document.getElementById("flashForm").onsubmit = async (e) => {
            e.preventDefault();
            const subject = document.getElementById("f-subject").value;
            const fEntries = document.querySelectorAll(".flashcard-entry");
            
            try {
                for (const entry of fEntries) {
                    const data = {
                        subject: subject,
                        question: entry.querySelector(".f-question").value,
                        answer: entry.querySelector(".f-answer").value
                    };
                    if(isEditing && editingType === 'flashcards') data.id = editingId;

                    await fetch('api/flashcards.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }
                showToast("Flashcards Saved!");
                e.target.reset();
                document.getElementById("flashcardsContainer").innerHTML = "";
                addFlashcardField();
                if (isEditing) {
                    fetchListView('flashcards');
                    resetEditState();
                }
            } catch (err) { alert("Error: " + err.message); }
        };

        // SAVE RESOURCE
        document.getElementById("resForm").onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                subject: document.getElementById("r-subject").value,
                title: document.getElementById("r-title").value,
                type: document.getElementById("r-type").value,
                url: document.getElementById("r-url").value
            };
            if(isEditing && editingType === 'resources') data.id = editingId;
            
            try {
                const res = await fetch('api/resources.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(result.success) {
                    showToast("Resource Saved!");
                    e.target.reset();
                    if (isEditing) {
                        fetchListView('resources');
                        resetEditState();
                    }
                }
            } catch (err) { alert("Error: " + err.message); }
        };

        // VIEW / DELETE DATA
        window.fetchListView = async (colName) => {
            const list = document.getElementById("dataList");
            list.innerHTML = "<p>Loading...</p>";
            
            try {
                const res = await fetch(`api/${colName}.php`);
                const data = await res.json();
                list.innerHTML = "";
                data.forEach((item) => {
                    const div = document.createElement("div");
                    div.className = "data-item";
                    div.id = `item-${item.id}`;
                    div.innerHTML = `
                        <span><strong>[${item.subject}]</strong> ${item.title || (item.question ? item.question.substring(0, 30) : 'Item')}</span>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <span class="edit-btn" style="color: #2D2D2D; cursor: pointer; font-weight: bold; background: #eee; padding: 5px 12px; border-radius: 8px;">Edit</span>
                            <span class="delete-btn" onclick="deleteItem('${colName}', '${item.id}')">✕ Delete</span>
                        </div>
                    `;
                    
                    const editBtn = div.querySelector(".edit-btn");
                    editBtn.onclick = async () => {
                        let itemData = item;
                        if(colName === 'quizzes') {
                            // Fetch full quiz with questions
                            const qRes = await fetch(`api/quizzes.php?subject=${item.subject}`);
                            const qData = await qRes.json();
                            itemData = qData[0];
                        }
                        startEdit(colName, item.id, itemData);
                    };
                    
                    list.appendChild(div);
                });
            } catch (err) { 
                list.innerHTML = "Error loading data."; 
            }
        };

        window.startEdit = (colName, id, itemData) => {
            resetEditState();
            isEditing = true;
            editingId = id;
            editingType = colName;

            let targetTab = '';
            if (colName === 'quizzes') targetTab = 'add-quiz';
            else if (colName === 'flashcards') targetTab = 'add-flash';
            else if (colName === 'resources') targetTab = 'add-resource';

            const tabBtn = document.querySelector(`.nav-btn[data-target="${targetTab}"]`);
            if (tabBtn) tabBtn.click();

            if (colName === 'quizzes') {
                document.getElementById("edit-label-quiz").classList.remove("hidden");
                document.getElementById("q-subject").value = itemData.subject;
                const container = document.getElementById("questionsContainer");
                container.innerHTML = "";
                itemData.questions.forEach((q, index) => addQuestionField(q, index + 1));
                document.querySelector("#quizForm .btn-save").innerText = "Update Quiz Package";
            } else if (colName === 'flashcards') {
                document.getElementById("edit-label-flash").classList.remove("hidden");
                document.getElementById("f-subject").value = itemData.subject;
                const container = document.getElementById("flashcardsContainer");
                container.innerHTML = "";
                addFlashcardField(itemData);
                document.querySelector("#flashForm .btn-save").innerText = "Update Flashcard";
                document.getElementById("addFlashBtn").classList.add("hidden");
            } else if (colName === 'resources') {
                document.getElementById("edit-label-res").classList.remove("hidden");
                document.getElementById("r-subject").value = itemData.subject;
                document.getElementById("r-title").value = itemData.title;
                document.getElementById("r-type").value = itemData.type;
                document.getElementById("r-url").value = itemData.url;
                document.querySelector("#resForm .btn-save").innerText = "Update Resource";
            }
        };

        function resetEditState() {
            isEditing = false;
            editingId = null;
            editingType = null;
            document.getElementById("edit-label-quiz").classList.add("hidden");
            document.getElementById("edit-label-flash").classList.add("hidden");
            document.getElementById("edit-label-res").classList.add("hidden");
            document.querySelector("#quizForm .btn-save").innerText = "Save Quiz Package";
            document.querySelector("#flashForm .btn-save").innerText = "Save Flashcard";
            document.querySelector("#resForm .btn-save").innerText = "Save Resource";
            document.getElementById("addFlashBtn").classList.remove("hidden");
            document.getElementById("addQuestionBtn").classList.remove("hidden");
        }

        window.deleteItem = async (colName, id) => {
            if(!confirm("Are you sure?")) return;
            try {
                await fetch(`api/${colName}.php?id=${id}`, { method: 'DELETE' });
                showToast("Deleted Successfully!");
                fetchListView(colName);
                if (isEditing && editingId === id) resetEditState();
            } catch (err) { alert("Error: " + err.message); }
        };

        // MANAGE USERS LOGIC
        async function fetchUsers() {
            const list = document.getElementById("userList");
            const res = await fetch('api/users.php');
            const users = await res.json();
            list.innerHTML = "";
            users.forEach(user => {
                const div = document.createElement("div");
                div.className = "data-item";
                div.innerHTML = `
                    <span><strong>${user.username}</strong> (${user.email}) - <em>${user.subject || 'N/A'}</em></span>
                    <div style="display: flex; gap: 10px;">
                        <button onclick='startEditUser(${JSON.stringify(user)})' style="padding: 5px 10px; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer;">Edit</button>
                        <button onclick="deleteUser(${user.id})" style="padding: 5px 10px; border-radius: 8px; border: 1px solid #ff4d4d; background: #fff; color: #ff4d4d; cursor: pointer;">Delete</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        window.startEditUser = (user) => {
            document.getElementById("editUserSection").classList.remove("hidden");
            document.getElementById("editUserId").value = user.id;
            document.getElementById("editingUserName").innerText = user.username;
            document.getElementById("editUserUsername").value = user.username;
            document.getElementById("editUserEmail").value = user.email;
            window.scrollTo(0, document.body.scrollHeight);
        };

        window.cancelUserEdit = () => {
            document.getElementById("editUserSection").classList.add("hidden");
        };

        document.getElementById("editUserForm").onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                id: document.getElementById("editUserId").value,
                username: document.getElementById("editUserUsername").value,
                email: document.getElementById("editUserEmail").value
            };
            const res = await fetch('api/users.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if ((await res.json()).success) {
                showToast("User Updated!");
                cancelUserEdit();
                fetchUsers();
            }
        };

        window.deleteUser = async (id) => {
            if(!confirm("Delete this user account permanently?")) return;
            await fetch(`api/users.php?id=${id}`, { method: 'DELETE' });
            showToast("User Deleted!");
            fetchUsers();
        };

        // Load users when clicking the tab
        document.querySelector('[data-target="manage-users"]').addEventListener('click', fetchUsers);
    </script>

</body>
</html>
