  </div>

  <div class="todo-input-group">
    <input type="text" id="todoInput" data-key="add-task" placeholder="What needs to be done?">

</div>
  </div>

</div>



<!----------------------js functions-------------------------------------------------------->

<script src="ux-enhancer.js"></script>
<script>
// ================= STATE =================
let currentTime = 45 * 60;
let timerInterval = null;
let isRunning = false;

let currentTimer = {
  name: "Focus Timer",
  duration: 45 * 60
};

// --- TODO STATE ---
window.currentTodos = [];

async function fetchTodos() {
    const res = await fetch('api/todos.php');
    window.currentTodos = await res.json();
    renderTodos();
}

function renderTodos() {
  if (!todoList) return;
  todoList.innerHTML = "";
  window.currentTodos.forEach((todo) => {
    const isCompleted = parseInt(todo.is_completed);
    const item = document.createElement("div");
    item.className = `todo-item ${isCompleted ? 'completed' : ''}`;
    
    item.innerHTML = `
      <div class="checkbox" onclick="window.toggleTodo(${todo.id}, ${isCompleted ? 0 : 1})">${isCompleted ? '✓' : ''}</div>
      <div class="todo-content">
        <h3>${todo.task_text}</h3>
        <p>${todo.task_date || 'Today'}</p>
      </div>
      <div class="delete-btn" onclick="window.deleteTodo(${todo.id})">✕</div>
    `;
    todoList.appendChild(item);
  });
}

window.toggleTodo = async function(id, newState) {
    await fetch('api/todos.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, completed: newState })
    });
    fetchTodos();
};

window.deleteTodo = async function(id) {
    await fetch(`api/todos.php?id=${id}`, { method: 'DELETE' });
    fetchTodos();
};

if (addTodoBtn && todoInput) {
  addTodoBtn.onclick = async () => {
    if (todoInput.value.trim()) {
      const newTodo = { 
        text: todoInput.value.trim(), 
        completed: 0,
        date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
      };
      await fetch('api/todos.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newTodo)
      });
      todoInput.value = "";
      fetchTodos();
    }
  };
  todoInput.onkeypress = (e) => {
    if (e.key === "Enter") addTodoBtn.onclick();
  };
}

// Initial Render
fetchTodos();
syncTimerState();
</script>
</body>
