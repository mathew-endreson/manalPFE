<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Boost your study productivity with our specialized Bac Pomodoro timer. Optimized for long study sessions and exam preparation.">

    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="ux-enhancer.css">
</head>
<body>
     <nav class="dashboard-navbar">
  <div class="dashboard-container">

    <!-- LOGO -->
    <div class="logo">
      <a href="home.html"><img src="assets/images/logo.svg" alt="logo"></a>
    </div>

    <!-- NAV LINKS -->
    <div class="dashboard-links">
      <a href="home.html" class="nav-item">
        <img src="assets/icons/Home.svg">
        <span data-key="home">Home</span>
      </a>

      <a href="library.html" class="nav-item">
        <img src="assets/icons/Library.svg">
        <span data-key="library">Library</span>
      </a>

      <a href="pomodoro.html" class="nav-item active">
        <img src="assets/icons/pomodoro.svg">
        <span data-key="pomodoro">Pomodoro</span>
      </a>

      <a href="calculator.html" class="nav-item">
        <img src="assets/icons/calculator.svg">
        <span data-key="calculator">Calculator</span>
      </a>

      <a href="games.html" class="nav-item">
        <img src="assets/icons/games.svg">
        <span>Games</span>
      </a>
    </div>

    <!-- RIGHT SIDE (SUPPORT ICON) -->
    <div class="nav-right">
      <img src="assets/icons/support.svg" class="support-icon">
    </div>

  </div>
</nav>

<div class="pomodoro-container">


  <!-- RIGHT (70%) -->
  <div class="pomodoro-right">
   

    <div class="timer-box">
    <img src="assets/images/timerBG.svg" class="timer-bg">

      <!-- HEADER -->
      <div class="timer-header">
        <h4 data-key="focus-timer">Focus Timer</h4>

        <div class="timer-actions">
          <button class="audio-btn">
            <img src="assets/icons/sound.svg">
          </button>

          <img src="assets/icons/edit.svg" class="edit-icon">
        </div>
      </div>

      <!-- MODES -->
      <div class="timer-modes">
        <button class="mode-btn active" data-time="00:45:00" data-key="focus-timer">Focus</button>
        <button class="mode-btn" data-time="00:15:00" data-key="short-break">Short Break</button>
        <button class="mode-btn" data-time="00:35:00" data-key="long-break">Long Break</button>
      </div>

      <!-- TIME -->
      <div class="timer-display" id="timerDisplay">
        00:45:00
      </div>

      <!-- ACTIONS -->
      <div class="timer-controls">
        <button class="play-btn">
          <img src="assets/icons/play.svg">
        </button>

        <button class="reset-btn">
          <img src="assets/icons/reset.svg">
        </button>
      </div>

    </div>

  </div>

  
  <!-- LEFT (30%) -->
  <div class="pomodoro-left">
    <div class="custom-timers">

  <!-- HEADER -->
  <div class="timers-header">
    <h4 data-key="todo-list">To-Do List</h4>
  </div>

  <div class="todo-input-group">
    <input type="text" id="todoInput" data-key="add-task" placeholder="What needs to be done?">
    <button class="add-todo-btn" id="addTodoBtn">
      <img src="assets/icons/add.svg">
    </button>
  </div>

  <hr>

  <!-- TODO LIST -->
  <div class="todo-list" id="todoList"></div>

</div>
  </div>

</div>



<!----------------------js functions-------------------------------------------------------->

<script src="ux-enhancer.js"></script>
<script>
// ================= STATE =================
let currentTime = 45 * 60;
let timerInterval = null;
let isRunning = false;

let currentTimer = {
  name: "Focus Timer",
  duration: 45 * 60
};

// --- TODO STATE ---
let todos = JSON.parse(localStorage.getItem("ezbac_todos")) || [];

// ================= ELEMENTS =================
const playBtn = document.querySelector(".play-btn");
const playIcon = playBtn.querySelector("img");
const resetBtn = document.querySelector(".reset-btn");
const timerDisplay = document.getElementById("timerDisplay");
const modeButtons = document.querySelectorAll(".mode-btn");

const todoInput = document.getElementById("todoInput");
const addTodoBtn = document.getElementById("addTodoBtn");
const todoList = document.getElementById("todoList");

// ================= PERSISTENCE HELPERS =================
function syncTimerState() {
    const savedEnd = localStorage.getItem("ezbac_timer_end");
    const savedRunning = localStorage.getItem("ezbac_timer_running") === "true";
    
    if (savedEnd && savedRunning) {
        const remaining = Math.round((parseInt(savedEnd) - Date.now()) / 1000);
        if (remaining > 0) {
            currentTime = remaining;
            startTimerLogic();
        } else {
            clearTimerPersistence();
        }
    } else {
        const savedBase = localStorage.getItem("ezbac_timer_base_seconds");
        if(savedBase) currentTime = parseInt(savedBase);
    }
    updateDisplay();
}

function clearTimerPersistence() {
    localStorage.removeItem("ezbac_timer_end");
    localStorage.setItem("ezbac_timer_running", "false");
}

function formatTime(seconds) {
  const h = String(Math.floor(seconds / 3600)).padStart(2, "0");
  const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, "0");
  const s = String(seconds % 60).padStart(2, "0");
  return `${h}:${m}:${s}`;
}

function updateDisplay() {
  timerDisplay.textContent = formatTime(currentTime);
}

// ================= ACTIONS =================
function startTimerLogic() {
    isRunning = true;
    playIcon.src = "assets/icons/pause.svg";
    
    // Save state
    const endTime = Date.now() + (currentTime * 1000);
    localStorage.setItem("ezbac_timer_end", endTime);
    localStorage.setItem("ezbac_timer_running", "true");

    timerInterval = setInterval(() => {
        const remaining = Math.round((parseInt(localStorage.getItem("ezbac_timer_end")) - Date.now()) / 1000);
        if (remaining > 0) {
            currentTime = remaining;
            updateDisplay();
        } else {
            stopTimerLogic(true);
        }
    }, 1000);
}

function stopTimerLogic(finished = false) {
    clearInterval(timerInterval);
    isRunning = false;
    playIcon.src = "assets/icons/play.svg";
    localStorage.setItem("ezbac_timer_running", "false");
    localStorage.setItem("ezbac_timer_base_seconds", finished ? currentTimer.duration : currentTime);
    
    if (finished) {
        currentTime = currentTimer.duration;
        updateDisplay();
        alert("Time's up! Great job!");
    }
}

playBtn.addEventListener("click", () => {
    if (isRunning) stopTimerLogic();
    else startTimerLogic();
});

resetBtn.addEventListener("click", () => {
  stopTimerLogic();
  currentTime = currentTimer.duration;
  localStorage.setItem("ezbac_timer_base_seconds", currentTime);
  updateDisplay();
});

modeButtons.forEach(button => {
  button.addEventListener("click", () => {
    stopTimerLogic();
    
    modeButtons.forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");

    const parts = button.dataset.time.split(":").map(Number);
    const seconds = parts[0]*3600 + parts[1]*60 + parts[2];

    currentTimer = {
      name: button.textContent,
      duration: seconds
    };

    currentTime = seconds;
    localStorage.setItem("ezbac_timer_base_seconds", currentTime);
    document.querySelector(".timer-header h4").textContent = button.textContent;
    updateDisplay();
  });
});

// ================= TODO SYNC =================
function saveAndRenderTodos() {
  localStorage.setItem("ezbac_todos", JSON.stringify(todos));
  renderTodos();
}

function renderTodos() {
  if (!todoList) return;
  todoList.innerHTML = "";
  todos.forEach((todo, index) => {
    const item = document.createElement("div");
    item.className = `todo-item ${todo.completed ? 'completed' : ''}`;
    
    // Using the same structure as home.html for consistency
    item.innerHTML = `
      <div class="checkbox" onclick="toggleTodo(${index})">${todo.completed ? '✓' : ''}</div>
      <div class="todo-content">
        <h3>${todo.text}</h3>
        <p>${todo.date || 'Today'}</p>
      </div>
      <div class="delete-btn" onclick="deleteTodo(${index})">✕</div>
    `;
    todoList.appendChild(item);
  });
}

window.toggleTodo = function(index) {
  todos[index].completed = !todos[index].completed;
  saveAndRenderTodos();
};

window.deleteTodo = function(index) {
  todos.splice(index, 1);
  saveAndRenderTodos();
};

if (addTodoBtn && todoInput) {
  addTodoBtn.onclick = () => {
    if (todoInput.value.trim()) {
      todos.push({ 
        text: todoInput.value.trim(), 
        completed: false,
        date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
      });
      todoInput.value = "";
      saveAndRenderTodos();
    }
  };
  todoInput.onkeypress = (e) => {
    if (e.key === "Enter") addTodoBtn.onclick();
  };
}

// Initial Render
renderTodos();
syncTimerState();
</script>
</body>
</html>
