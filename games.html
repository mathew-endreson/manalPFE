<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZ Bac - Courses | Subject Catalog</title>
  <meta name="description"
    content="Explore Bac subjects and preparation modules. From Math to Philosophy, find the courses you need to excel with EZ Bac.">
  <link rel="icon" type="image/png" href="ezbac-icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ux-enhancer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <nav class="dashboard-navbar">
    <div class="dashboard-container">

      <!-- LOGO -->
      <div class="logo">
        <a href="home.html"><img src="assets/images/logo.svg" alt="EzBac Logo"></a>
      </div>

      <!-- NAV LINKS -->
      <div class="dashboard-links">
        <a href="home.html" class="nav-item">
          <img src="assets/icons/Home.svg">
          <span>Home</span>
        </a>

        <a href="library.html" class="nav-item">
          <img src="assets/icons/Library.svg">
          <span>Library</span>
        </a>

        <a href="pomodoro.html" class="nav-item">
          <img src="assets/icons/pomodoro.svg">
          <span>Pomodoro</span>
        </a>

        <a href="calculator.html" class="nav-item">
          <img src="assets/icons/calculator.svg">
          <span>Calculator</span>
        </a>

        <a href="games.html" class="nav-item active">
          <img src="assets/icons/games.svg">
          <span>Games</span>
        </a>
      </div>

      <!-- RIGHT SIDE (SUPPORT ICON) -->
      <div class="nav-right">
        <img src="assets/icons/support.svg" class="support-icon">
      </div>

    </div>
  </nav>

  <section class="courses-header">
    <img src="assets/images/illustration.svg" alt="Illustration" class="header-illustration">
    <h2>Interactive Catalog</h2>
    <div class="course-search-bar">
      <input type="text" id="courseSearch" placeholder="Find quizzes or flashcards..." onkeyup="filterBySearch()">
    </div>
  </section>

  <div class="filter-buttons">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="quiz">Quizzes</button>
    <button class="filter-btn" data-filter="flashcard">Flashcards</button>
  </div>

  <hr style="opacity: 0.1; margin: 30px 0;">

  <div class="courses-container" id="coursesContainer">
    <!-- Dynamic Subjects will load here -->
    <p id="loadingMsg" style="text-align: center; width: 100%; padding: 100px;">Fetching academic catalog...</p>
  </div>

  <script>
    const container = document.getElementById("coursesContainer");

    async function loadDynamicCatalog() {
      try {
        const uniqueEntries = new Set();

        // Fetch Quizzes
        const quizRes = await fetch('api/quizzes.php');
        const quizzes = await quizRes.json();
        quizzes.forEach(q => uniqueEntries.add(`${q.subject}|quiz`));

        // Fetch Flashcards
        const flashRes = await fetch('api/flashcards.php');
        const flashcards = await flashRes.json();
        flashcards.forEach(f => uniqueEntries.add(`${f.subject}|flashcard`));

        // Fetch Resources
        const resRes = await fetch('api/resources.php');
        const resources = await resRes.json();
        resources.forEach(r => uniqueEntries.add(`${r.subject}|resource`));

        container.innerHTML = "";

        if (uniqueEntries.size === 0) {
          container.innerHTML = `<p style="text-align:center; width:100%; padding:50px;">The catalog is empty. Add content from the Admin Dashboard!</p>`;
          return;
        }

        uniqueEntries.forEach(entry => {
          const [subject, type] = entry.split('|');
          renderCard({ subject, type });
        });

      } catch (err) {
        container.innerHTML = `<p>Error loading catalog: ${err.message}</p>`;
      }
    }

    function renderCard(item) {
      const card = document.createElement("div");
      card.className = "course-card";
      card.onclick = () => openSubject(item.subject, item.type);

      let icon = 'assets/icons/book.svg';
      if (item.type === 'quiz') icon = 'assets/icons/tests.svg';
      else if (item.type === 'flashcard') icon = 'assets/icons/flashcards.svg';
      else if (item.type === 'resource') icon = 'assets/icons/Library.svg';

      card.innerHTML = `
            <div class="card-top-icon"><img src="${icon}"></div>
            <div class="card-tags">
                <span class="tag">${item.type}</span>
                <span class="tag">${item.subject}</span>
            </div>
            <h4 class="card-title">${item.subject} ${item.type === 'quiz' ? 'Assessment' :
          item.type === 'flashcard' ? 'Flashcards' : 'Managed Resources'
        }</h4>
        `;
      container.appendChild(card);
    }

    window.openSubject = function (subject, type) {
      if (type === 'quiz') {
        localStorage.setItem("selectedQuizSubject", subject);
        window.location.href = 'quiz.html';
      } else if (type === 'flashcard') {
        localStorage.setItem("selectedFlashSubject", subject);
        window.location.href = 'flashcard.html';
      } else {
        window.location.href = 'library.html';
      }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll(".course-card").forEach(card => {
          const typeTag = card.querySelector(".tag").innerText;
          card.style.display = (filter === 'all' || typeTag === filter) ? "flex" : "none";
        });
      };
    });

    window.onload = () => {
      loadDynamicCatalog();
    };
  </script>
  <script src="ux-enhancer.js"></script>
</body>

</html>
