<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Bac - Interactive Quizzes | Practice for Success</title>
    <meta name="description" content="Test your knowledge with live quizzes on all Bac subjects. Instant feedback and real-time learning in Algeria.">
    <meta property="og:title" content="EZ Bac Quizzes - Test Your Knowledge">
    <meta property="og:image" content="https://ez-bac.vercel.app/ezbac-icon.png">
    
    <link rel="icon" type="image/png" href="ezbac-icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

 <nav class="dashboard-navbar">
  <div class="dashboard-container">
    <div class="logo">
      <a href="home.html"><img src="assets/images/logo.svg" alt="logo"></a>
    </div>
    <div class="dashboard-links">
      <a href="home.html" class="nav-item">
        <img src="assets/icons/Home.svg">
        <span>Home</span>
      </a>
      <a href="library.html" class="nav-item">
        <img src="assets/icons/Library.svg">
        <span>Library</span>
      </a>
      <a href="pomodoro.html" class="nav-item">
        <img src="assets/icons/pomodoro.svg">
        <span>Pomodoro</span>
      </a>
      <a href="calculator.html" class="nav-item">
        <img src="assets/icons/calculator.svg">
        <span>Calculator</span>
      </a>
    </div>
    <div class="nav-right">
      <img src="assets/icons/support.svg" class="support-icon">
    </div>
  </div>
</nav>

<div class="quiz-page">
  <div class="quiz-header">
    <button class="return-btn" onclick="window.location.href='home.html'"><h5>← Back</h5></button>
  </div>

  <!-- Loading State -->
  <div id="loading" style="text-align: center; padding: 100px;">
      <h2 style="color: #BB181D;">Fetching Quizzes...</h2>
      <p>Please wait for the live data.</p>
  </div>

  <!-- Cover Section -->
  <div class="quiz-container hidden" id="quizCover">
    <div class="quiz-info">
      <h4 class="quiz-title">Subject Quiz</h4>
      <p class="quiz-description">Interactive assessment powered by EzBac Firestore.</p>
    </div>
    <div class="quiz-content-box">
      <h3 class="quiz-content-title" id="displaySubject">Quizzes</h3>
      <div class="quiz-action">
        <button class="btn-primary" id="startBtn">Start Learning</button>
      </div>
    </div>
  </div>

  <!-- Active Quiz Section -->
  <div class="quiz-active hidden" id="quizActive">
    <div class="quiz-active-header">
      <span class="quiz-progress" id="progressText">1 / 10</span>
      <button class="report-btn">Report</button>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="quiz-question">
      <h4 id="questionText">Loading question...</h4>
      <p class="quiz-sub">Choose the correct answer</p>
    </div>
    <div class="answers-container" id="answersContainer"></div>
    
    <!-- Navigation Buttons -->
    <div class="quiz-nav" style="display: flex; justify-content: space-between; margin-top: 40px; gap: 20px;">
        <button class="btn-primary" id="prevBtn" style="background: #333; flex: 1; opacity: 0.5; cursor: not-allowed;" disabled>Previous</button>
        <button class="btn-primary" id="nextBtn" style="flex: 1; opacity: 0.5; cursor: not-allowed;" disabled>Next</button>
    </div>
  </div>
</div>

<script type="module">
    import { db } from './firebase.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // STATE
    let quizData = [];
    let currentQuestion = 0;
    let score = 0;
    let userAnswers = []; // Store user selection for each question
    const selectedSubject = localStorage.getItem("selectedQuizSubject") || "Math";

    // ELEMENTS
    const cover = document.getElementById("quizCover");
    const active = document.getElementById("quizActive");
    const loading = document.getElementById("loading");

    // INITIAL FETCH
    async function initQuiz() {
        try {
            const q = query(collection(db, "quizzes"), where("subject", "==", selectedSubject));
            const querySnapshot = await getDocs(q);
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if (data.questions && Array.isArray(data.questions)) {
                    // It's a multi-question quiz doc
                    quizData.push(...data.questions);
                } else {
                    // It's a legacy single-question quiz doc
                    quizData.push(data);
                }
            });

            if (quizData.length === 0) {
                loading.innerHTML = `<h2>No quizzes found for ${selectedSubject}</h2><a href="home.html">Go Back</a>`;
                return;
            }

            // Shuffle if desired, or keep as is
            loading.classList.add("hidden");
            cover.classList.remove("hidden");
            document.getElementById("displaySubject").innerText = `${selectedSubject} Quiz`;
            document.querySelector(".quiz-title").innerText = selectedSubject;
            document.querySelector(".quiz-description").innerText = `${quizData.length} interactive questions found.`;
        } catch (err) {
            loading.innerHTML = `<h2>Error loading data.</h2><p>${err.message}</p>`;
        }
    }

    // STARTING
    document.getElementById("startBtn").onclick = () => {
        cover.classList.add("hidden");
        active.classList.remove("hidden");
        loadQuestion();
    };

    function loadQuestion() {
        if (currentQuestion >= quizData.length) return showResults();

        const q = quizData[currentQuestion];
        document.getElementById("progressText").innerText = `${currentQuestion + 1} / ${quizData.length}`;
        document.getElementById("questionText").innerText = q.question;
        
        const answersContainer = document.getElementById("answersContainer");
        answersContainer.innerHTML = "";
        
        q.options.forEach((opt) => {
            const div = document.createElement("div");
            div.className = "answer";
            div.innerHTML = `<h5>${opt}</h5>`;
            
            // If already answered, show the state
            if (userAnswers[currentQuestion]) {
                if (opt === q.correctAnswer) div.classList.add("correct");
                if (opt === userAnswers[currentQuestion].selected && opt !== q.correctAnswer) div.classList.add("wrong");
                div.style.pointerEvents = "none";
            } else {
                div.onclick = () => selectAnswer(opt, div);
            }
            
            answersContainer.appendChild(div);
        });

        const progressPercent = ((currentQuestion + 1) / quizData.length) * 100;
        document.getElementById("progressFill").style.width = `${progressPercent}%`;

        // Update Nav Buttons
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        prevBtn.disabled = currentQuestion === 0;
        prevBtn.style.opacity = prevBtn.disabled ? "0.5" : "1";
        prevBtn.style.cursor = prevBtn.disabled ? "not-allowed" : "pointer";

        nextBtn.disabled = !userAnswers[currentQuestion] || currentQuestion === quizData.length - 1;
        nextBtn.style.opacity = nextBtn.disabled ? "0.5" : "1";
        nextBtn.style.cursor = nextBtn.disabled ? "not-allowed" : "pointer";

        // If it's the last question and answered, allow finishing
        if (userAnswers[currentQuestion] && currentQuestion === quizData.length - 1) {
            nextBtn.innerText = "Finish";
            nextBtn.disabled = false;
            nextBtn.style.opacity = "1";
            nextBtn.style.cursor = "pointer";
        } else {
            nextBtn.innerText = "Next";
        }
    }

    document.getElementById("prevBtn").onclick = () => {
        if (currentQuestion > 0) {
            currentQuestion--;
            loadQuestion();
        }
    };

    document.getElementById("nextBtn").onclick = () => {
        if (currentQuestion === quizData.length - 1 && userAnswers[currentQuestion]) {
            showResults();
        } else if (currentQuestion < quizData.length - 1) {
            currentQuestion++;
            loadQuestion();
        }
    };

    function selectAnswer(selected, element) {
        if (userAnswers[currentQuestion]) return;

        const q = quizData[currentQuestion];
        const answers = document.querySelectorAll(".answer");
        
        // Prevent double clicking
        answers.forEach(a => a.style.pointerEvents = "none");

        const isCorrect = selected === q.correctAnswer;
        userAnswers[currentQuestion] = { selected, isCorrect };
        
        if (isCorrect) {
            element.classList.add("correct");
            score++;
        } else {
            element.classList.add("wrong");
            // Find and show the correct one
            answers.forEach(a => {
                if (a.innerText.trim() === q.correctAnswer) {
                    a.classList.add("correct");
                }
            });
        }

        // Enable "Next" button immediately
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
        nextBtn.style.cursor = "pointer";
        if (currentQuestion === quizData.length - 1) nextBtn.innerText = "Finish";


    }

    function showResults() {
        active.innerHTML = `
            <div class="test-result" style="text-align:center; padding: 60px 20px; animation: slideUp 0.6s ease;">
                <h1 style="font-size: 5rem; color: #BB181D; margin-bottom: 20px;">${score} / ${quizData.length}</h1>
                <h2 style="font-weight: 700;">Quiz Finished!</h2>
                <p style="margin: 20px 0; color: #666; max-width: 400px; margin-left: auto; margin-right: auto;">
                    ${score === quizData.length ? 'Perfect Score! You are ready for the BAC.' : 'Good job! Keep practicing to improve your score.'}
                </p>
                <div style="display:flex; gap:16px; justify-content:center; margin-top: 30px;">
                    <button class="btn-primary" onclick="location.reload()" style="padding: 12px 30px;">Restart</button>
                    <button class="btn-primary" onclick="window.location.href='home.html'" style="padding: 12px 30px; background: #333;">Dashboard</button>
                </div>
            </div>
        `;
    }

    initQuiz();
</script>

</body>
</html>
