<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZ Bac - Home Dashboard | Your Learning Hub</title>
  <meta name="description"
    content="Access your personalized study dashboard. Track your progress, manage to-dos, and use the Pomodoro timer for effective Bac preparation.">
  <meta name="author" content="EZ Bac">

  <!-- Open Graph -->
  <meta property="og:title" content="EZ Bac Dashboard - Study Smarter">
  <meta property="og:description" content="Track your progress and access interactive resources on EZ Bac.">
  <meta property="og:image" content="https://ez-bac.vercel.app/ezbac-icon.png">

  <link rel="icon" type="image/png" href="ezbac-icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body style="font-family: 'Outfit', sans-serif;">
  <nav class="dashboard-navbar">
    <div class="dashboard-container">

      <!-- LOGO -->
      <div class="logo">
        <a href="index.html"><img src="assets/images/logo.svg" alt="EZ Bac Home" loading="lazy"></a>
      </div>

      <!-- NAV LINKS -->
      <div class="dashboard-links">
        <a href="home.html" class="nav-item active">
          <img src="assets/icons/Home.svg">
          <span>Home</span>
        </a>

        <a href="library.html" class="nav-item">
          <img src="assets/icons/Library.svg">
          <span>Library</span>
        </a>

        <a href="pomodoro.html" class="nav-item">
          <img src="assets/icons/pomodoro.svg">
          <span>Pomodoro</span>
        </a>

        <a href="calculator.html" class="nav-item">
          <img src="assets/icons/calculator.svg">
          <span>Calculator</span>
        </a>

        <a href="games.html" class="nav-item">
          <img src="assets/icons/games.svg">
          <span>Games</span>
        </a>
      </div>

      <!-- RIGHT SIDE (SUPPORT ICON) -->
      <div class="nav-right">
        <img src="assets/icons/support.svg" class="support-icon">
      </div>

    </div>
  </nav>

  <div class="dashboard-content">

    <!-- LEFT SIDE (80%) -->
    <div class="dashboard-left">

      <!-- WELCOME -->
      <div class="welcome-section">
        <h1>Welcome to EZBAC </h1>
        <p>Let's start your journey to an easier BAC!</p>
      </div>

      <!-- SHORTCUTS -->
      <div class="shortcuts-placeholder">
        <div class="feilds-buttons">
          <button class="filter-btn" data-filter="resume">
            <img src="assets/icons/resume.svg" alt="Resumes Icon">
            <span>Resumes</span>
          </button>
          <button class="filter-btn" data-filter="test">
            <img src="assets/icons/tests.svg" alt="Tests Icon">
            <span>Quiz</span>
          </button>


          <button class="filter-btn" data-filter="flashcard">
            <img src="assets/icons/flashcards.svg" alt="Flashcards Icon">
            <span>Flashcards</span>
          </button>


        </div>
      </div>

      <!-- CONTINUE LEARNING -->
      <div class="section-header">
        <h3>Continue Learning</h3>

        <div class="scroll-buttons">
          <img src="assets/icons/arrow-left.svg" class="scroll-btn left">
          <img src="assets/icons/arrow-right.svg" class="scroll-btn right">
        </div>
      </div>

      <div class="cards-row">
        <!-- FLASHCARDS -->
        <div class="horizontal-courses" id="flashcardsContainer"></div>
      </div>


      <div class="section-header">
        <h3>Recently Viewed Resumes</h3>
        <div class="scroll-buttons">
          <img src="assets/icons/arrow-left.svg" class="scroll-btn left">
          <img src="assets/icons/arrow-right.svg" class="scroll-btn right">
        </div>
      </div>
      <div class="cards-row">
        <!-- RESUMES -->
        <div class="horizontal-courses" id="resumesContainer"></div>
      </div>

    </div>

    <!-- RIGHT SIDE (20%) -->
    <div class="dashboard-right">
      <div class="right-card pomodoro-card">
        <h4 data-key="pomodoro">Pomodoro</h4>
        <div class="pomodoro-timer">
          <h1>45:00</h1>
        </div>
        <div class="pomodoro-actions">
          <button class="play-btn">
            <img src="assets/icons/play.svg">
          </button>
          <button class="more-btn" onclick="window.location.href='pomodoro.html'">
            <img src="assets/icons/more.svg">
          </button>
        </div>
      </div>

      <div class="right-card todo-card">
        <div class="todo-header">
          <h4>To-Do list</h4>
          <button class="add-btn">+</button>
        </div>
        <div class="todo-input-box">
          <input type="text" id="todo-input" placeholder="Add a new task...">
        </div>
        <div class="todo-list" id="todo-list"></div>
      </div>
    </div>

  </div>

  <script type="module">
    import { db } from './firebase.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ================= ANALYTICS =================
    function updateAnalytics() {
      const todos = JSON.parse(localStorage.getItem("ezbac_todos")) || [];
      const completedTodos = todos.filter(t => t.completed).length;
      const progress = todos.length ? Math.round((completedTodos / todos.length) * 100) : 0;

      const statTitles = document.querySelectorAll(".stat-card h1");
      if (statTitles.length >= 3) {
        statTitles[0].innerText = progress + "%";
        statTitles[1].innerText = localStorage.getItem("ezbac_completed_courses") || "0";
        statTitles[2].innerText = localStorage.getItem("ezbac_study_hours") || "0";
      }
    }

    // ================= DYNAMIC CONTENT FETCHING =================
    async function loadDashboardContent() {
      try {
        // Fetch Flashcards
        const flashSnap = await getDocs(collection(db, "flashcards"));
        const flashcards = [];
        flashSnap.forEach(doc => flashcards.push({ id: doc.id, ...doc.data() }));
        renderCards("flashcardsContainer", flashcards, "flashcard");

        // Fetch Resources (as resumes)
        const resSnap = await getDocs(collection(db, "resources"));
        const resources = [];
        resSnap.forEach(doc => resources.push({ id: doc.id, ...doc.data() }));
        renderCards("resumesContainer", resources, "resource");
      } catch (err) {
        console.error("Dashboard Load Error:", err);
      }
    }

    function renderCards(containerId, data, category) {
      const container = document.getElementById(containerId);
      if (!container) return;

      container.innerHTML = "";
      if (data.length === 0) {
        container.innerHTML = `<p style="padding: 20px; color: #888; font-size: 14px;">No ${category}s available yet.</p>`;
        return;
      }

      data.slice(0, 6).forEach(item => { // Show max 6
        const card = document.createElement("div");
        card.classList.add("course-card");
        card.style.cursor = "pointer";

        const subject = item.subject || "General";
        const title = item.title || item.question || "Untitled";

        card.innerHTML = `
          <div class="card-top-icon">
            <img src="assets/icons/book.svg">
          </div>
          <div class="card-tags">
            <span class="tag">${category}</span>
            <span class="tag">${subject}</span>
          </div>
          <h4 class="card-title">${title}</h4>
          <div class="card-save">
            <img src="assets/icons/save.svg" class="save-icon">
          </div>
        `;

        card.onclick = () => {
          if (category === "flashcard") {
            localStorage.setItem("selectedFlashSubject", subject);
            window.location.href = 'flashcard.html';
          } else {
            window.location.href = 'library.html';
          }
        };

        container.appendChild(card);
      });
    }

    // ================= TO-DO SYNC =================
    let todos = JSON.parse(localStorage.getItem("ezbac_todos")) || [];

    function saveAndRenderTodos() {
      localStorage.setItem("ezbac_todos", JSON.stringify(todos));
      renderTodoList();
      updateAnalytics();
    }

    function renderTodoList() {
      const list = document.getElementById("todo-list");
      if (!list) return;

      list.innerHTML = "";
      todos.forEach((todo, index) => {
        const item = document.createElement("div");
        item.className = `todo-item ${todo.completed ? 'completed' : ''}`;

        item.innerHTML = `
          <div class="checkbox" onclick="window.toggleTodo(${index})">${todo.completed ? '✓' : ''}</div>
          <div class="todo-content">
            <h3>${todo.text}</h3>
            <p>${todo.date || 'Today'}</p>
          </div>
          <div class="delete-btn" onclick="window.deleteTodo(${index})">✕</div>
        `;
        list.appendChild(item);
      });
    }

    window.toggleTodo = function (index) {
      todos[index].completed = !todos[index].completed;
      saveAndRenderTodos();
    };

    window.deleteTodo = function (index) {
      todos.splice(index, 1);
      saveAndRenderTodos();
    };

    const addBtn = document.querySelector(".add-btn");
    const inputBox = document.querySelector(".todo-input-box");
    const input = document.getElementById("todo-input");

    if (addBtn && inputBox && input) {
      addBtn.addEventListener("click", () => {
        const isHidden = getComputedStyle(inputBox).display === "none";
        inputBox.style.display = isHidden ? "block" : "none";
        if (isHidden) input.focus();
      });

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && input.value.trim()) {
          todos.push({
            text: input.value.trim(),
            completed: false,
            date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
          });
          input.value = "";
          inputBox.style.display = "none";
          saveAndRenderTodos();
        }
      });
    }

    // ================= POMODORO SYNC =================
    const pomodoroDisplay = document.querySelector(".pomodoro-timer h1");
    let homeTimerInterval = null;

    function updateHomeTimer() {
      const savedEnd = localStorage.getItem("ezbac_timer_end");
      const savedRunning = localStorage.getItem("ezbac_timer_running") === "true";
      const savedBase = localStorage.getItem("ezbac_timer_base_seconds") || (45 * 60);

      if (savedEnd && savedRunning) {
        const remaining = Math.round((parseInt(savedEnd) - Date.now()) / 1000);
        if (remaining > 0) {
          renderHomeTime(remaining);
          if (!homeTimerInterval) homeTimerInterval = setInterval(updateHomeTimer, 1000);
        } else {
          renderHomeTime(savedBase);
          clearInterval(homeTimerInterval);
          homeTimerInterval = null;
        }
      } else {
        renderHomeTime(savedBase);
        clearInterval(homeTimerInterval);
        homeTimerInterval = null;
      }
    }

    function renderHomeTime(seconds) {
      if (!pomodoroDisplay) return;
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      pomodoroDisplay.innerText = `${m}:${s}`;

      const playBtnIco = document.querySelector(".pomodoro-card .play-btn img");
      const savedRunning = localStorage.getItem("ezbac_timer_running") === "true";
      if (playBtnIco) playBtnIco.src = savedRunning ? "assets/icons/pause.svg" : "assets/icons/play.svg";
    }

    const homePlayBtn = document.querySelector(".pomodoro-card .play-btn");
    if (homePlayBtn) {
      homePlayBtn.onclick = () => {
        const isRunning = localStorage.getItem("ezbac_timer_running") === "true";
        if (isRunning) {
          localStorage.setItem("ezbac_timer_running", "false");
          const savedEnd = localStorage.getItem("ezbac_timer_end");
          const remaining = Math.round((parseInt(savedEnd) - Date.now()) / 1000);
          localStorage.setItem("ezbac_timer_base_seconds", remaining > 0 ? remaining : (45 * 60));
          localStorage.removeItem("ezbac_timer_end");
        } else {
          const base = parseInt(localStorage.getItem("ezbac_timer_base_seconds")) || (45 * 60);
          localStorage.setItem("ezbac_timer_end", Date.now() + (base * 1000));
          localStorage.setItem("ezbac_timer_running", "true");
        }
        updateHomeTimer();
      };
    }

    // ================= INITIALIZE =================
    document.addEventListener("DOMContentLoaded", () => {
      loadDashboardContent();
      renderTodoList();
      updateAnalytics();
      updateHomeTimer();

      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.onclick = () => {
          const filter = btn.getAttribute("data-filter");
          localStorage.setItem("courseFilter", filter);
          if (filter === "resume") {
            window.location.href = 'library.html';
          } else {
            window.location.href = 'games.html';
          }
        };
      });

      function smoothScroll(element, amount, duration) {
        const start = element.scrollLeft;
        const startTime = performance.now();

        function animate(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          // Ease out cubic pattern for a faster but smooth flow
          const ease = 1 - Math.pow(1 - progress, 3);
          element.scrollLeft = start + (amount * ease);
          if (progress < 1) requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
      }

      document.querySelectorAll(".section-header").forEach(section => {
        const wrapper = section.nextElementSibling;
        const container = wrapper ? wrapper.querySelector(".horizontal-courses") : null;
        const leftBtn = section.querySelector(".left");
        const rightBtn = section.querySelector(".right");

        if (container && rightBtn) {
          rightBtn.onclick = () => smoothScroll(container, 500, 75);
        }
        if (container && leftBtn) {
          leftBtn.onclick = () => smoothScroll(container, -500, 75);
        }
      });
    });
  </script>
  <script src="ux-enhancer.js"></script>
</body>

</html>
