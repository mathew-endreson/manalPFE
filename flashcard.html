<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Bac - Flashcards | Memorize Faster</title>
    <meta name="description" content="Interactive flashcards for Bac key concepts. Flip, learn, and master your subjects with EZ Bac.">
    <meta property="og:title" content="EZ Bac Flashcards - Learn Efficiently">
    
    <link rel="icon" type="image/png" href="ezbac-icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ux-enhancer.css">
    <style>
        .flash-card-outer {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-top: 40px;
        }

        .flash-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-radius: 30px;
        }

        .flash-card-outer.flipped .flash-card-inner {
            transform: rotateY(180deg);
        }

        .flash-front, .flash-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 30px;
            background: white;
        }

        .flash-back {
            transform: rotateY(180deg);
            color: #BB181D;
        }

        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .nav-btn {
            background: #eee;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .nav-btn:hover { background: #ddd; }
    </style>
</head>
<body>

 <nav class="dashboard-navbar">
  <div class="dashboard-container">
    <div class="logo">
      <a href="home.html"><img src="assets/images/logo.svg" alt="logo"></a>
    </div>
    <div class="dashboard-links">
      <a href="home.html" class="nav-item">
        <img src="assets/icons/Home.svg">
        <span>Home</span>
      </a>
      <a href="library.html" class="nav-item">
        <img src="assets/icons/Library.svg">
        <span>Library</span>
      </a>
      <a href="pomodoro.html" class="nav-item">
        <img src="assets/icons/pomodoro.svg">
        <span>Pomodoro</span>
      </a>
      <a href="calculator.html" class="nav-item">
        <img src="assets/icons/calculator.svg">
        <span data-key="calculator">Calculator</span>
      </a>
    </div>
  </div>
</nav>

<div class="flash-page">
  <div class="flash-header">
    <button class="return-btn" onclick="window.location.href='home.html'"><h5>← Back</h5></button>
  </div>

  <div id="loading" style="text-align: center; padding: 100px;">
      <h2 style="color: #BB181D;">Loading Decks...</h2>
  </div>

  <div class="flash-container hidden" id="flashMain">
    <div class="flash-info">
      <h4 class="flash-title" id="subjectTag">Subject</h4>
      <p class="flash-description" id="progressIndicator">Card 1 / 10</p>
    </div>

    <div class="flash-content-box" style="box-shadow: none; background: transparent; padding: 0;">
      
      <div class="flash-card-outer" id="cardOuter" onclick="this.classList.toggle('flipped')">
          <div class="flash-card-inner">
              <div class="flash-front">
                  <h2 id="questionText">Question</h2>
              </div>
              <div class="flash-back">
                  <h3 id="answerText">Answer</h3>
              </div>
          </div>
      </div>

      <div class="nav-controls">
          <button class="nav-btn" onclick="prevCard()">Previous</button>
          <button class="nav-btn" onclick="nextCard()">Next</button>
      </div>

    </div>
</div>

<script type="module">
    import { db } from './firebase.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let cards = [];
    let currentIndex = 0;
    const selectedSubject = localStorage.getItem("selectedFlashSubject") || "Physics";

    async function initFlash() {
        try {
            const q = query(collection(db, "flashcards"), where("subject", "==", selectedSubject));
            const querySnapshot = await getDocs(q);
            
            querySnapshot.forEach((doc) => cards.push(doc.data()));

            if(cards.length === 0) {
                document.getElementById("loading").innerHTML = `<h2>No cards for ${selectedSubject}</h2>`;
                return;
            }

            document.getElementById("loading").classList.add("hidden");
            document.getElementById("flashMain").classList.remove("hidden");
            document.getElementById("subjectTag").innerText = selectedSubject;
            updateCard();
        } catch (err) { alert(err.message); }
    }

    window.updateCard = function() {
        if(cards.length === 0) return;
        
        document.getElementById("cardOuter").classList.remove("flipped");
        document.getElementById("progressIndicator").innerText = `Card ${currentIndex + 1} / ${cards.length}`;
        
        setTimeout(() => {
            document.getElementById("questionText").innerText = cards[currentIndex].question;
            document.getElementById("answerText").innerText = cards[currentIndex].answer;
        }, 150);
    }

    window.nextCard = function() {
        if(currentIndex < cards.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    window.prevCard = function() {
        if(currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    initFlash();
</script>
<script src="ux-enhancer.js"></script>
</body>
</html>
