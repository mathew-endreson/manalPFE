<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzBac | Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ux-enhancer.css">
</head>
<body style="font-family: 'Outfit', sans-serif;">

<nav class="dashboard-navbar">
  <div class="dashboard-container">
    <div class="logo">
      <a href="home.html"><img src="assets/images/logo.svg" alt="logo"></a>
    </div>
    <div class="dashboard-links">
      <a href="home.html" class="nav-item">
        <img src="assets/icons/Home.svg">
        <span>Home</span>
      </a>
      <a href="library.html" class="nav-item active">
        <img src="assets/icons/Library.svg">
        <span>Library</span>
      </a>
      <a href="pomodoro.html" class="nav-item">
        <img src="assets/icons/pomodoro.svg">
        <span>Pomodoro</span>
      </a>
      <a href="calculator.html" class="nav-item">
        <img src="assets/icons/calculator.svg">
        <span data-key="calculator">Calculator</span>
      </a>
    </div>
  </div>
</nav>

<section class="courses-header">
    <img src="assets/images/illustration.svg" alt="Illustration" class="header-illustration">
    <h2>Academic Resource Hub</h2>
    <div class="course-search-bar">
      <input type="text" id="libSearch" placeholder="Search resources..." onkeyup="filterLib()">
    </div>
</section>

<div class="filter-buttons" id="libFilters">
  <button class="filter-btn active" data-subject="all">All</button>
  <!-- Dynamic buttons -->
</div>

<hr style="opacity: 0.1; margin: 30px 0;">

<div class="courses-container" id="resourceContainer">
    <!-- Dynamic Resources -->
    <p id="loadingMsg" style="text-align: center; width: 100%; padding: 50px;">Fetching resources...</p>
</div>

<script type="module">
    import { db } from './firebase.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const container = document.getElementById("resourceContainer");
    let allResources = [];

    async function loadResources() {
        try {
            const querySnapshot = await getDocs(collection(db, "resources"));
            allResources = [];
            
            const subjects = new Set();
            querySnapshot.forEach(doc => {
                const data = doc.data();
                allResources.push(data);
                subjects.add(data.subject);
            });

            renderFilters(subjects);
            renderResources(allResources);
        } catch (err) {
            container.innerHTML = `<p>Error loading resources: ${err.message}</p>`;
        }
    }

    function renderResources(data) {
        container.innerHTML = "";
        if(data.length === 0) {
            container.innerHTML = `<p style="text-align:center; width:100%;">No resources found.</p>`;
            return;
        }

        data.forEach(res => {
            const card = document.createElement("div");
            card.className = "course-card res-card";
            card.style.display = "flex";
            card.style.flexDirection = "column";
            card.style.justifyContent = "space-between";
            card.style.padding = "25px";

            const icon = res.type === "drive" ? "📂" : "🎥";
            
            card.innerHTML = `
                <div>
                    <div style="font-size: 40px; margin-bottom: 15px;">${icon}</div>
                    <span class="tag" style="background: ${res.type === 'drive' ? '#e3f2fd' : '#fff0f0'}; color: ${res.type === 'drive' ? '#1e88e5' : '#BB181D'};">
                        ${res.subject}
                    </span>
                    <h4 style="margin: 15px 0;">${res.title}</h4>
                </div>
                <button onclick="window.open('${res.url}', '_blank')" class="btn-primary" style="margin-top: 10px; width: 100%; padding: 10px;">
                    Open Resource
                </button>
            `;
            container.appendChild(card);
        });
    }

    function renderFilters(subjects) {
        const filterContainer = document.getElementById("libFilters");
        subjects.forEach(sub => {
            const btn = document.createElement("button");
            btn.className = "filter-btn";
            btn.dataset.subject = sub;
            btn.innerText = sub;
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filtered = allResources.filter(r => r.subject === sub);
                renderResources(filtered);
            };
            filterContainer.appendChild(btn);
        });
        
        // Fix for "All" button
        document.querySelector('.filter-btn[data-subject="all"]').onclick = (e) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            renderResources(allResources);
        };
    }

    // SEARCH FILTER
    window.filterLib = () => {
        const query = document.getElementById("libSearch").value.toLowerCase();
        const filtered = allResources.filter(r => 
            r.title.toLowerCase().includes(query) || 
            r.subject.toLowerCase().includes(query)
        );
        renderResources(filtered);
    }

    loadResources();
</script>
<script src="ux-enhancer.js"></script>
</body>
</html>
